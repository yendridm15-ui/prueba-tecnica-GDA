# Compose para levantar el entorno local completo (nginx + php-fpm + mysql)
# sin necesidad de tener PHP, Composer ni MySQL instalados en la máquina.
# No es una configuración pensada para producción.
services:
  app:
    build: .
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: mydb
      DB_USERNAME: mydb_user
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_USER: mydb_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # -h 127.0.0.1 fuerza TCP: durante la init de primer arranque MySQL solo
      # escucha el socket, así que "localhost" daría un healthy falso antes de
      # que el puerto 3306 acepte conexiones y el app arrancaría demasiado pronto.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  mysql_data:
